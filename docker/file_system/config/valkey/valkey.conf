port 0
unixsocket /run/valkey/valkey.sock
unixsocketperm 770

maxmemory 64mb
maxmemory-policy allkeys-lru

dir /data/db/valkey
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 32mb

save ""

tcp-keepalive 300
timeout 0

loglevel notice
logfile ""

protected-mode no
